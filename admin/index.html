<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autos Ortiz — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .gate img {
      width: 80px;
      margin-bottom: 24px;
    }
    .gate h1 {
      font-size: 22px;
      color: #e63946;
      margin-bottom: 8px;
    }
    .gate p {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }
    .gate input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #12141c;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .gate input[type="password"]:focus {
      border-color: #e63946;
    }
    .gate button {
      width: 100%;
      padding: 14px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .gate button:hover { background: #c5303c; }
    .gate .error {
      color: #e63946;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .logo-lock {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <svg class="logo-lock" viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="1.5">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      <circle cx="12" cy="16" r="1" fill="#e63946"/>
    </svg>
    <h1>Autos Ortiz — Admin</h1>
    <p>Ingresa la contraseña para continuar</p>
    <input type="password" id="pw" placeholder="Contraseña" onkeydown="if(event.key==='Enter')tryLogin()" />
    <button onclick="tryLogin()">Entrar</button>
    <div class="error" id="err">Contraseña incorrecta</div>
  </div>

  <script>
    // ── CAMBIAR AQUÍ ──
    var ADMIN_PW = 'autosortiz';
    // ──────────────────

    function tryLogin() {
      var input = document.getElementById('pw').value;
      if (input === ADMIN_PW) {
        sessionStorage.setItem('adminAuth', '1');
        loadCMS();
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pw').value = '';
      }
    }

    function loadCMS() {
      var gate = document.getElementById('gate');
      gate.innerHTML = '<p style="color:#888;font-size:14px;margin-top:40px;">Cargando panel de edición...</p>';
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/decapcms@^3/dist/decapcms.js';
      document.head.appendChild(s);
    }

    // Si ya autenticado, cargar directo
    if (sessionStorage.getItem('adminAuth') === '1') {
      loadCMS();
    }
  </script>
</body>
</html>
