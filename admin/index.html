<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autos Ortiz — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22262f;
      --border: #2a2d3a;
      --accent: #e63946;
      --accent2: #c5303c;
      --text: #e0e0e0;
      --muted: #888;
      --green: #2ecc71;
      --orange: #f39c12;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── APP ── */
    .app { display: block; }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 18px; color: var(--accent); }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .header .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn-logout { background: var(--surface2); color: var(--text); }
    .btn-logout:hover { background: #2d3140; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { background: #27ae60; }

    /* ── STATS BAR ── */
    .stats-bar {
      padding: 16px 24px;
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .stats-bar span { color: var(--text); font-weight: 600; }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      flex: 1;
      min-width: 200px;
    }
    .search-box input {
      width: 100%;
      padding: 9px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent); }
    .toolbar .btn {
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    /* ── GRID ── */
    .cars-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 24px;
    }

    /* ── CAR CARD ── */
    .car-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s;
    }
    .car-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .car-thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #111;
    }
    .car-body { padding: 16px; }
    .car-brand { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
    .car-model { font-size: 16px; font-weight: 700; margin: 4px 0; }
    .car-price { font-size: 20px; font-weight: 800; color: var(--green); margin: 8px 0 4px; }
    .car-price-old { font-size: 13px; color: var(--muted); text-decoration: line-through; }
    .car-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .car-id { font-size: 11px; color: var(--muted); margin-top: 10px; }
    .car-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .car-actions .btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
    }
    .btn-edit { background: var(--surface2); color: var(--text); }
    .btn-edit:hover { background: #2d3140; }
    .btn-delete { background: rgba(231,57,70,0.15); color: var(--accent); }
    .btn-delete:hover { background: rgba(231,57,70,0.25); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 { font-size: 18px; }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* ── FORM ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      z-index: 2000;
      display: none;
      animation: slideIn 0.3s ease;
    }
    .toast.show { display: block; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--accent); color: var(--accent); }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ── LOADING ── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,17,23,0.85);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONFIRM DELETE ── */
    .confirm-box { text-align: center; padding: 20px 0; }
    .confirm-box p { font-size: 15px; margin-bottom: 24px; color: var(--text); }

    /* ── MISC ── */
    .tag-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag-select label {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag-select input[type="radio"] { display: none; }
    .tag-select input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .photo-preview img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .photo-preview div {
      position: relative;
    }
    .photo-preview .remove-photo {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════ APP ══ -->
<div class="app" id="app">

  <div class="header">
    <h1>🚗 Autos Ortiz — Admin</h1>
    <div class="header-right">
      <a href="https://autosortiz.github.io/autos-ortiz-web/" target="_blank" class="btn btn-logout" style="text-decoration:none">Ver sitio</a>
    </div>
  </div>

  <div class="stats-bar">
    Total de autos: <span id="statTotal">0</span>
    &nbsp;|&nbsp;
    <span id="statNew">0</span> nuevos
    &nbsp;|&nbsp;
    <span id="statFeatured">0</span> destacados
    &nbsp;|&nbsp;
    <span id="statSold">0</span> vendidos
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar por marca, modelo..." oninput="renderCards(filtered)" />
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">+ Agregar auto</button>
  </div>

  <div class="cars-grid" id="carsGrid"></div>

</div>

<!-- ══════════════════════════════════════ ADD/EDIT MODAL ══ -->
<div class="modal-overlay" id="carModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Agregar auto</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="carForm" onsubmit="saveCar(event)">
        <input type="hidden" id="carId" />

        <div class="form-grid">
          <div class="form-group">
            <label>Marca *</label>
            <input id="fMarca" required placeholder="Ej: Nissan" />
          </div>
          <div class="form-group">
            <label>Modelo *</label>
            <input id="fModelo" required placeholder="Ej: Versa" />
          </div>
          <div class="form-group">
            <label>Año *</label>
            <input id="fAnio" type="number" required placeholder="Ej: 2023" min="1990" max="2030" />
          </div>
          <div class="form-group">
            <label>Versión</label>
            <input id="fVersion" placeholder="Ej: Exclusive, LX" />
          </div>
          <div class="form-group">
            <label>Kilometraje</label>
            <input id="fKm" placeholder="Ej: 45,000 km" />
          </div>
          <div class="form-group">
            <label>Combustible</label>
            <input id="fCombustible" placeholder="Ej: Gasolina" />
          </div>
          <div class="form-group">
            <label>Transmisión</label>
            <input id="fTransmision" placeholder="Ej: Automática" />
          </div>
          <div class="form-group">
            <label>Precio actual *</label>
            <input id="fPrecioAhora" type="number" required placeholder="Ej: 185000" />
          </div>
          <div class="form-group full">
            <label>Precio anterior (tachado)</label>
            <input id="fPrecioAntes" type="number" placeholder="0 si no hay descuento" value="0" />
          </div>
          <div class="form-group full">
            <label>Foto principal (URL) *</label>
            <input id="fImagen" type="text" required placeholder="img/autos/marca-modelo-año/foto-01.jpeg" />
            <div class="photo-preview" id="imgPreview"></div>
          </div>
          <div class="form-group full">
            <label>Todas las fotos (URLs, una por línea)</label>
            <textarea id="fImagenes" rows="4" placeholder="Una URL por línea&#10;ej:&#10;img/autos/kia-sportage-2018/foto-01.jpeg&#10;img/autos/kia-sportage-2018/foto-02.jpeg"></textarea>
            <div class="photo-preview" id="imagenesPreview"></div>
          </div>
          <div class="form-group full">
            <label>Etiqueta</label>
            <input id="fBadge" placeholder="Ej: Como nuevo, Excelentes condiciones" />
          </div>
          <div class="form-group full">
            <label>Tag</label>
            <div class="tag-select">
              <input type="radio" name="fTag" id="tagEmpty" value="" checked />
              <label for="tagEmpty">Normal</label>
              <input type="radio" name="fTag" id="tagNew" value="new" />
              <label for="tagNew">Nuevo</label>
              <input type="radio" name="fTag" id="tagGold" value="gold" />
              <label for="tagGold">Destacado</label>
              <input type="radio" name="fTag" id="tagSold" value="vendido" />
              <label for="tagSold">Vendido</label>
            </div>
          </div>
        </div>

        <div class="modal-footer" style="margin-top:24px;padding:0;border:none">
          <button type="button" class="btn btn-logout" onclick="closeModal()" style="padding:12px 24px">Cancelar</button>
          <button type="submit" class="btn btn-success" style="padding:12px 24px">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════ DELETE CONFIRM ══ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2>Eliminar auto</h2>
      <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="confirm-box">
        <p>¿Estás seguro de eliminar este auto?<br/><strong id="deleteCarName"></strong></p>
        <button class="btn btn-delete" onclick="confirmDelete()" style="padding:12px 32px">Sí, eliminar</button>
        <button class="btn btn-logout" onclick="closeDeleteModal()" style="padding:12px 24px;margin-left:8px">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════ TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════ LOADING ══ -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingMsg">Guardando...</div>
</div>

<script>
// ══════════════════════════════════════ CONFIG ══
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx2DEvIwKTWEaMz6PcYdcB4HOttza93xunof-9c8qlil3lYrDBYTQJXaKx7gX6xb5UL/exec';

// ══════════════════════════════════════ STATE ══
let allAutos = [];
let filtered = [];
let deleteTarget = null;

// ══════════════════════════════════════ INIT ══
async function initApp() {
  showLoading('Cargando autos...');
  await loadAutos();
  hideLoading();
  document.getElementById('searchInput').value = '';
  renderCards(allAutos);
  updateStats();
}

async function loadAutos() {
  try {
    const r = await fetch(SCRIPT_URL + '?action=read');
    const json = await r.json();
    if (!json.success) throw new Error(json.error || 'Error al cargar');
    allAutos = json.data;
    filtered = [...allAutos];
  } catch (e) {
    console.error(e);
    showToast('Error al cargar autos. Revisa la configuración.', 'error');
    allAutos = [];
    filtered = [];
  }
}

// ══════════════════════════════════════ RENDER ══
function renderCards(autos) {
  const grid = document.getElementById('carsGrid');
  if (!autos || autos.length === 0) {
    grid.innerHTML = `<div class="empty-state"><h3>Sin resultados</h3><p>No hay autos que coincidan con la búsqueda</p></div>`;
    return;
  }
  grid.innerHTML = autos.map(auto => `
    <div class="car-card">
      <img class="car-thumb" src="${imgUrl(auto.imagen)}" alt="${auto.marca} ${auto.modelo}"
           onerror="this.src='https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=400&q=80'" />
      <div class="car-body">
        ${auto.badge ? `<span class="car-badge">${auto.badge}</span>` : ''}
        <div class="car-brand">${auto.marca}</div>
        <div class="car-model">${auto.modelo} ${auto.año}</div>
        ${auto.version ? `<div style="font-size:12px;color:var(--muted)">${auto.version}</div>` : ''}
        ${auto.precioAntes > 0
          ? `<div class="car-price-old">${fmt(auto.precioAntes)}</div><div class="car-price">${fmt(auto.precioAhora)}</div>`
          : `<div class="car-price">${fmt(auto.precioAhora)}</div>`}
        ${auto.tag === 'new' ? '<span style="font-size:11px;color:#3498db">🏷️ Nuevo</span>' : ''}
        ${auto.tag === 'gold' ? '<span style="font-size:11px;color:#f39c12">⭐ Destacado</span>' : ''}
        ${auto.tag === 'vendido' ? '<span style="font-size:11px;color:#e63946">✓ Vendido</span>' : ''}
        <div class="car-id">#${auto.id}</div>
        <div class="car-actions">
          <button class="btn btn-edit" onclick="openEditModal(${auto.id})">Editar</button>
          <button class="btn btn-delete" onclick="openDeleteModal(${auto.id})">Eliminar</button>
        </div>
      </div>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('statTotal').textContent = allAutos.length;
  document.getElementById('statNew').textContent = allAutos.filter(a => a.tag === 'new').length;
  document.getElementById('statFeatured').textContent = allAutos.filter(a => a.tag === 'gold').length;
  document.getElementById('statSold').textContent = allAutos.filter(a => a.tag === 'vendido').length;
}

// ══════════════════════════════════════ SEARCH ══
function renderCards(autos) {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const visible = q
    ? autos.filter(a =>
        a.marca.toLowerCase().includes(q) ||
        a.modelo.toLowerCase().includes(q) ||
        (a.version || '').toLowerCase().includes(q) ||
        String(a.año).includes(q)
      )
    : autos;

  const grid = document.getElementById('carsGrid');
  if (!visible.length) {
    grid.innerHTML = `<div class="empty-state"><h3>Sin resultados</h3><p>${q ? 'No hay autos que coincidan con la búsqueda' : 'Agrega tu primer auto con el botón +'}</p></div>`;
    return;
  }
  grid.innerHTML = visible.map(auto => `
    <div class="car-card">
      <img class="car-thumb" src="${imgUrl(auto.imagen)}" alt="${auto.marca} ${auto.modelo}"
           onerror="this.src='https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=400&q=80'" />
      <div class="car-body">
        ${auto.badge ? `<span class="car-badge">${auto.badge}</span>` : ''}
        <div class="car-brand">${auto.marca}</div>
        <div class="car-model">${auto.modelo} ${auto.año}</div>
        ${auto.version ? `<div style="font-size:12px;color:var(--muted)">${auto.version}</div>` : ''}
        ${auto.precioAntes > 0
          ? `<div class="car-price-old">${fmt(auto.precioAntes)}</div><div class="car-price">${fmt(auto.precioAhora)}</div>`
          : `<div class="car-price">${fmt(auto.precioAhora)}</div>`}
        ${auto.tag === 'new' ? '<span style="font-size:11px;color:#3498db">🏷️ Nuevo</span>' : ''}
        ${auto.tag === 'gold' ? '<span style="font-size:11px;color:#f39c12">⭐ Destacado</span>' : ''}
        ${auto.tag === 'vendido' ? '<span style="font-size:11px;color:#e63946">✓ Vendido</span>' : ''}
        <div class="car-id">#${auto.id}</div>
        <div class="car-actions">
          <button class="btn btn-edit" onclick="openEditModal(${auto.id})">Editar</button>
          <button class="btn btn-delete" onclick="openDeleteModal(${auto.id})">Eliminar</button>
        </div>
      </div>
    </div>`).join('');
}

function fmt(n) {
  return '$' + Number(n).toLocaleString('es-MX');
}

// ══════════════════════════════════════ MODAL ADD ══
function openAddModal() {
  document.getElementById('modalTitle').textContent = 'Agregar auto';
  document.getElementById('carForm').reset();
  document.getElementById('carId').value = '';
  // next ID
  const maxId = allAutos.length ? Math.max(...allAutos.map(a => a.id)) : 99;
  document.getElementById('fAnio').value = new Date().getFullYear();
  document.getElementById('imgPreview').innerHTML = '';
  document.getElementById('imagenesPreview').innerHTML = '';
  document.getElementById('carModal').classList.add('show');
}

function openEditModal(id) {
  const auto = allAutos.find(a => a.id === id);
  if (!auto) return;
  document.getElementById('modalTitle').textContent = 'Editar auto';
  document.getElementById('carId').value = auto.id;
  document.getElementById('fMarca').value = auto.marca;
  document.getElementById('fModelo').value = auto.modelo;
  document.getElementById('fAnio').value = auto.año;
  document.getElementById('fVersion').value = auto.version || '';
  document.getElementById('fKm').value = auto.km || '';
  document.getElementById('fCombustible').value = auto.combustible || '';
  document.getElementById('fTransmision').value = auto.transmision || '';
  document.getElementById('fPrecioAhora').value = auto.precioAhora;
  document.getElementById('fPrecioAntes').value = auto.precioAntes || 0;
  document.getElementById('fImagen').value = auto.imagen || '';
  document.getElementById('fImagenes').value = (auto.imagenes || []).join('\n');
  document.getElementById('fBadge').value = auto.badge || '';

  // reset tag radios
  document.querySelectorAll('input[name="fTag"]').forEach(r => r.checked = false);
  const tagRadio = document.querySelector(`input[name="fTag"][value="${auto.tag || ''}"]`);
  if (tagRadio) tagRadio.checked = true;
  else document.getElementById('tagEmpty').checked = true;

  // preview
  document.getElementById('imgPreview').innerHTML = auto.imagen
    ? `<img src="${imgUrl(auto.imagen)}" style="width:60px;height:45px;object-fit:cover;border-radius:6px;border:1px solid var(--border)" />` : '';
  document.getElementById('imagenesPreview').innerHTML = (auto.imagenes || []).map(i =>
    `<div><img src="${imgUrl(i)}" /></div>`).join('');

  document.getElementById('carModal').classList.add('show');
}

function closeModal() {
  document.getElementById('carModal').classList.remove('show');
}

function saveCar(e) {
  e.preventDefault();
  const idField = document.getElementById('carId');
  const isEdit = idField.value !== '';
  const imagenesRaw = document.getElementById('fImagenes').value.trim();
  const imagenes = imagenesRaw ? imagenesRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];

  const tagRadio = document.querySelector('input[name="fTag"]:checked');
  const tag = tagRadio ? tagRadio.value : '';

  const auto = {
    id: isEdit ? parseInt(idField.value) : Math.max(...allAutos.map(a => a.id), 99) + 1,
    marca: document.getElementById('fMarca').value.trim(),
    modelo: document.getElementById('fModelo').value.trim(),
    año: parseInt(document.getElementById('fAnio').value),
    version: document.getElementById('fVersion').value.trim(),
    km: document.getElementById('fKm').value.trim(),
    combustible: document.getElementById('fCombustible').value.trim(),
    transmision: document.getElementById('fTransmision').value.trim(),
    precioAntes: parseInt(document.getElementById('fPrecioAntes').value) || 0,
    precioAhora: parseInt(document.getElementById('fPrecioAhora').value),
    imagen: document.getElementById('fImagen').value.trim(),
    imagenes: imagenes.length ? imagenes : [document.getElementById('fImagen').value.trim()],
    badge: document.getElementById('fBadge').value.trim(),
    tag: tag
  };

  if (isEdit) {
    const idx = allAutos.findIndex(a => a.id === auto.id);
    if (idx > -1) allAutos[idx] = auto;
  } else {
    allAutos.unshift(auto);
  }

  closeModal();
  saveToGitHub(auto, isEdit ? 'update' : 'create');
}

// ══════════════════════════════════════ DELETE ══
function openDeleteModal(id) {
  const auto = allAutos.find(a => a.id === id);
  if (!auto) return;
  deleteTarget = id;
  document.getElementById('deleteCarName').textContent = `${auto.marca} ${auto.modelo} ${auto.año}`;
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
  deleteTarget = null;
}

function confirmDelete() {
  if (deleteTarget === null) return;
  allAutos = allAutos.filter(a => a.id !== deleteTarget);
  closeDeleteModal();
  saveToGitHub(null, 'delete');
}

// ══════════════════════════════════════ SAVE TO GITHUB ══
async function saveToGitHub(auto, action) {
  showLoading(action === 'delete' ? 'Eliminando...' : 'Guardando...');
  try {
    let arr = [...allAutos];
    if (action === 'delete') {
      arr = arr.filter(a => a.id !== deleteTarget);
    } else if (action === 'update') {
      const idx = arr.findIndex(a => a.id === auto.id);
      if (idx > -1) arr[idx] = auto;
    } else {
      arr.unshift(auto);
    }

    const message = action === 'delete'
      ? `Eliminar auto #${deleteTarget}`
      : (action === 'update' ? `Actualizar ${auto.marca} ${auto.modelo}` : `Agregar ${auto.marca} ${auto.modelo}`);

    const r = await fetch(SCRIPT_URL + '?action=write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `data=${encodeURIComponent(JSON.stringify({ autos: arr, message: message }))}`
    });

    const json = await r.json();
    if (!json.success) throw new Error(json.error || 'Error al guardar');

    await loadAutos();
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const displayed = q
      ? allAutos.filter(a =>
          a.marca.toLowerCase().includes(q) ||
          a.modelo.toLowerCase().includes(q) ||
          (a.version || '').toLowerCase().includes(q) ||
          String(a.año).includes(q)
        )
      : allAutos;
    renderCards(displayed);
    updateStats();
    hideLoading();
    showToast(action === 'delete' ? 'Auto eliminado' : 'Guardado correctamente ✓', 'success');

  } catch (e) {
    hideLoading();
    console.error(e);
    showToast('Error al guardar: ' + e.message, 'error');
  }
}

// ══════════════════════════════════════ HELPERS ══
const SITE_ROOT = 'https://autosortiz.github.io/autos-ortiz-web';
function imgUrl(path) {
  if (!path) return 'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=400&q=80';
  if (path.startsWith('http')) return path;
  return SITE_ROOT + '/' + path.replace(/^\/+/, '');
}
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════ BOOT ══
initApp();
</script>
